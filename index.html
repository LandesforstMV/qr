<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald-Entdecker Station</title>
    <style>
        :root {
            --forstgruen: #154734;      
            --sommergruen: #3e822c;     
            --fruehlingsgruen: #91ae2d; 
            --weiss: #ffffff;
            --schwarz: #2d2a26;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--sommergruen);
            color: var(--schwarz);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: var(--forstgruen);
            padding: 20px 0;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-placeholder {
            width: 200px;
            height: 50px;
            margin: 0 auto;
            border: 1px dashed rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 15px;
        }

        .intro {
            text-align: center;
            color: var(--weiss);
            margin-bottom: 30px;
        }

        .kategorie {
            display: inline-block;
            background-color: var(--forstgruen);
            color: var(--weiss);
            padding: 13px 17px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            border: 1px solid var(--fruehlingsgruen);
        }

        h1 { margin:0; font-size: 2.2rem; color: var(--weiss); }

        .card {
            background: var(--weiss);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        h2 {
            color: var(--forstgruen);
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .step-num {
            background-color: var(--forstgruen);
            color: var(--weiss);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        p { line-height: 1.5; font-size: 1.05rem; margin: 0; color: #333; }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 0.8rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header id="category-header" style="width: 100%; background-color: var(--category-color, #154734); padding: 15px 0; position: sticky; top: 0; z-index: 100; transition: background-color 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
    <div style="max-width: 800px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
        <h1 id="kat-label" style="color: white; margin: 0; font-family: sans-serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;">
            
        </h1>
        <span style="color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 0.9rem;" id="station-number">
            Station 01
        </span>
    </div>
</header>

    <div class="container" id="content-app">
        <div class="intro">
            <h1 id="thema-label">Lade...</h1>
        </div>

        <div id="cards-container">
            </div>
    </div>

<footer style="width: 100%; text-align: center;">

    <p style="font-size: 0.8rem; color: #fff;">&copy; 2026 Landesforstanstalt Melckenburg-Vorpommern</p>
</footer>

    <script>
        // Hier kannst du deine Daten aus Excel/JSON einfügen
        const stationData = {
            kategorie: "Naturschutz & Lebensräume",
            thema: "Insektenhotel",
            bereiche: [
                {
                    titel: "Was siehst du hier?",
                    text: "Ein Insektenhotel bietet Wildbienen, Käfern und anderen Insekten einen geschützten Platz zum Nisten und Überwintern. Die Röhren, Löcher und Hohlräume ahmen natürliche Strukturen wie hohle Stängel oder Risse im Holz nach."
                },
                {
                    titel: "Warum ist das wichtig?",
                    text: "Viele Insekten finden in der aufgeräumten Landschaft keine natürlichen Nistplätze mehr. Hier helfen wir ihnen direkt vor Ort."
                },
                {
                    titel: "Schon gewusst?",
                    text: "Über 560 Wildbienenarten leben in Deutschland – viele davon sind auf kleine Hohlräume angewiesen."
                },
                {
                    titel: "Entdeckerfrage",
                    text: "Schau dir die Röhren genau an: Sind einige mit Lehm oder Pflanzenresten verschlossen? Dann hat dort bereits eine Biene ihr Nest gebaut."
                }
            ]
        };

        // Funktion zum Befüllen der Seite
        function renderStation() {
            document.getElementById('kat-label').textContent = stationData.kategorie;
            document.getElementById('thema-label').textContent = stationData.thema;

            const container = document.getElementById('cards-container');
            container.innerHTML = ""; // Leer machen

            stationData.bereiche.forEach((bereich, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2><div class="step-num">${index + 1}</div> ${bereich.titel}</h2>
                    <p>${bereich.text}</p>
                `;
                container.appendChild(card);
            });
        }

        // Start
        renderStation();
    </script>
</body>
</html>
