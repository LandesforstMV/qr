<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald-Entdecker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="daten.js"></script>
    <style>
        :root {
            --forstgruen: #154734;      
            --weiss: #ffffff;
            --schwarz: #2d2a26;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--forstgruen);
            color: var(--schwarz);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: background-color 0.4s ease;
        }

        .header-content {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #kat-label {
            color: white;
            margin: 0;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #station-number {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 15px;
        }

        .intro {
            text-align: center;
            color: var(--weiss);
            margin-bottom: 30px;
        }

        h1 { margin:0; font-size: 2.2rem; color: var(--weiss); }

        .card {
            background: var(--weiss);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--forstgruen);
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .step-num {
            color: var(--weiss);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
            transition: background-color 0.4s ease;
        }

        p { line-height: 1.6; font-size: 1.05rem; margin: 0; color: #333; }

        footer {
            text-align: center;
            padding:0 20px 5px 20px;
            margin-top: auto;
        }

        footer p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

<header id="category-header">
    <div class="header-content">
        <i id="kat-icon" class="fa-solid"></i> <span id="kat-label">Wald-Entdecker</span>
        <span id="station-number">Station --</span>
    </div>
</header>

<div class="container">
    <div class="intro">
        <h1 id="thema-label">Lade...</h1>
    </div>

    <div id="cards-container">
        </div>
</div>

<footer>
    <p>&copy; 2026 Landesforstanstalt Mecklenburg-Vorpommern</p>
</footer>

<script>
    function renderStation() {
        // 1. ID aus der URL holen (z.B. station.html?id=2)
        const urlParams = new URLSearchParams(window.location.search);
        const stationID = urlParams.get('id') || "1"; 

        // 2. Daten aus dem Katalog in daten.js holen
        const s = stationsKatalog[stationID];

        if (s) {
            const farbe = s.farbe || "#154734"; // Fallback auf Forstgrün

            // 3. Header & Texte anpassen
            document.getElementById('category-header').style.backgroundColor = farbe;
            
            // Icon setzen: Falls kein Icon in daten.js definiert ist, wird ein Standard-Baum (fa-tree) genutzt
            const iconClass = s.icon || "fa-tree";
            
            // Wir bauen den Inhalt des kat-label neu zusammen: Icon + Text
            document.getElementById('kat-label').innerHTML = `
                <i class="fa-solid ${iconClass}"></i> 
                <span>${s.kategorie}</span>
            `;

            document.getElementById('thema-label').textContent = s.thema;
            document.getElementById('station-number').textContent = "Station " + (stationID.padStart(2, '0'));

            // 4. Karten generieren
            const container = document.getElementById('cards-container');
            container.innerHTML = ""; 

            s.bereiche.forEach((bereich, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2>
                        <div class="step-num" style="background-color: ${farbe}">
                            ${index + 1}
                        </div> 
                        ${bereich.titel}
                    </h2>
                    <p>${bereich.text}</p>
                `;
                container.appendChild(card);
            });
        } else {
            document.getElementById('thema-label').textContent = "Station nicht gefunden";
        }
    }

    // Beim Laden der Seite ausführen
    window.onload = renderStation;
</script>

</body>
</html>
